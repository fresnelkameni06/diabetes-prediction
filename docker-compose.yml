version: '3.8'

services:

  # ─── Service API FastAPI ───────────────────────────────────
  api:
    build: .
    container_name: diabetes-api
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
    environment:
      - PYTHONPATH=/app
    restart: always

  # ─── Service Streamlit ────────────────────────────────────
  streamlit:
    build: .
    container_name: diabetes-streamlit
    ports:
      - "8501:8501"
    volumes:
      - ./models:/app/models
    environment:
      - PYTHONPATH=/app
      - API_URL=http://api:8000
    depends_on:
      - api
    command: streamlit run streamlit_app/app.py --server.port 8501 --server.address 0.0.0.0
    restart: always